<section class="py-11.5 xl:py-50 relative">
  <div class="max-w-[1336px] mx-auto px-8 relative z-20">
    <div class="max-w-[760px] mx-auto bg-white/95 rounded-[24px] border border-black/10 p-5 md:bg-transparent md:border-0 md:p-0">
      <div>
        <h2 class="text-[2rem] lg:text-[3.5rem] text-center times-font mb-4">Find your city</h2>
         <p class="text-center text-[15px] lg:text-xl text-[#5C5955]">Start typing to search, or browse by region. The goal is simple: choose your city, then submit one clear request so we can confirm discreetly.</p>
      </div>

      <div class="mt-7 md:mt-9">
        <div class="flex flex-col gap-4 md:flex-row md:gap-0 md:rounded-[16px] md:border md:border-[#2D2D2D]">
          <label class="h-[52px] md:h-[56px] flex items-center gap-3 px-4 md:px-5 rounded-[13px] border border-[#D3D3D3] bg-[#F4F4F4] md:rounded-none md:border-0 md:bg-transparent md:flex-1">
            <i class="fa-solid fa-magnifying-glass text-[#6C6965] text-[20px]" aria-hidden="true"></i>
            <input
              type="text"
              placeholder="Search a city..."
              class="w-full bg-transparent outline-none border-0 p-0 text-[18px] md:text-[34px] leading-none text-[#2D2D2D] placeholder:text-[#6E6B67] times-font"
              aria-label="Search city"
            />
          </label>

          <div class="relative z-30 h-[52px] md:h-[56px] flex items-center gap-3 px-4 md:px-5 rounded-[13px] border border-[#D3D3D3] bg-[#F4F4F4] md:rounded-none md:border-0 md:bg-transparent md:border-l md:border-l-[#2D2D2D] md:flex-1" data-custom-select>
            <i class="fa-solid fa-location-dot text-[#6C6965] text-[20px]" aria-hidden="true"></i>
            <input type="hidden" name="region" value="" data-custom-select-value />
            <button
              type="button"
              class="w-full h-full text-left bg-transparent outline-none border-0 p-0 pr-6 text-[18px] md:text-[34px] leading-none text-[#4D4A46] times-font"
              aria-haspopup="listbox"
              aria-expanded="false"
              aria-label="Browse by region"
              data-custom-select-trigger
            >
              <span class="block truncate" data-custom-select-label>Browse by region</span>
            </button>
            <i class="fa-solid fa-angle-down text-[#6C6965] text-[13px] transition-transform duration-200" aria-hidden="true" data-custom-select-chevron></i>

            <div
              class="absolute left-0 right-0 top-[calc(100%+10px)] z-50 rounded-[14px] border border-[#2D2D2D]/25 bg-[#F8F4EE] shadow-[0_18px_35px_rgba(0,0,0,0.12)] p-2 max-h-[280px] overflow-y-auto opacity-0 pointer-events-none translate-y-1 transition-all duration-200"
              role="listbox"
              tabindex="-1"
              data-custom-select-menu
            >
              <button type="button" class="w-full text-left rounded-[10px] px-3 py-2.5 text-[16px] md:text-[22px] text-[#47433E] times-font hover:bg-[#ECE4D8] transition-colors" role="option" data-value="north-america" data-label="North America">North America</button>
              <button type="button" class="w-full text-left rounded-[10px] px-3 py-2.5 text-[16px] md:text-[22px] text-[#47433E] times-font hover:bg-[#ECE4D8] transition-colors" role="option" data-value="europe" data-label="Europe">Europe</button>
              <button type="button" class="w-full text-left rounded-[10px] px-3 py-2.5 text-[16px] md:text-[22px] text-[#47433E] times-font hover:bg-[#ECE4D8] transition-colors" role="option" data-value="middle-east" data-label="Middle East">Middle East</button>
              <button type="button" class="w-full text-left rounded-[10px] px-3 py-2.5 text-[16px] md:text-[22px] text-[#47433E] times-font hover:bg-[#ECE4D8] transition-colors" role="option" data-value="asia" data-label="Asia">Asia</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
