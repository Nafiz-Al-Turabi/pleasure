<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - Pleasure</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="../style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div id="navbar"></div>
    <main>
      <header class="pt-10 lg:pt-20 xl:pt-[120px] mb-[70px]">
        <div class="max-w-[1336px] mx-auto px-8 py-16 xl:py-25">
          <div
            class="flex flex-col lg:flex-row justify-between items-center mb-10"
          >
            <div class="">
              <p
                class="hidden lg:block text-center lg:text-left text-xl leading-[110%]"
              >
                Age 28 · Milan
              </p>
              <h1
                class="text-center lg:text-left text-[3.5rem] lg:text-[4.5rem] xl:text-[5.625rem] leading-[110%] tracking-[-2%] times-font mb-2 lg:mb-4"
              >
                Clara Bennett
              </h1>

              <p
                class="text-center lg:text-left text-[#00000099] lg:text-black text-base lg:text-xl italic leading-[110%] mb-1.5"
              >
                REFINED · CALM · DISCREET
              </p>
              <p
                class="lg:hidden text-center lg:text-left text-xl leading-[110%]"
              >
                Age 28 · Milan
              </p>
              <button
                class="hidden lg:block bg-[#E5DED4] w-full lg:w-fit sm:bg-transparent text-black flex justify-center sm:justify-start items-center sm:items-end text-xl xl:text-2xl font-tight tracking-[-1px] leading-[110%] text-left py-4 sm:py-0 px-6 sm:px-0 border-2 border-black sm:border-none rounded-full cursor-pointer lg:hover:text-black/75 lg:active:text-black/50 duration-300 mt-6.5"
              >
                Booking request
                <i class="fa-solid fa-arrow-right text-xl -rotate-45 ml-2"></i>
              </button>
            </div>
            <div class="w-full lg:w-auto mt-8 lg:mt-0">
              <img
                src="/assets/images/curated/p1.jpg"
                alt=""
                class="w-full h-full lg:h-[560px] lg:w-[503px] object-cover rounded-2xl lg:rounded-none"
              />
              <button
                class="lg:hidden bg-[#E5DED4] w-full lg:w-fit sm:bg-transparent text-black flex justify-center sm:justify-start items-center sm:items-end text-xl xl:text-2xl font-tight tracking-[-1px] leading-[110%] text-left py-4 sm:py-0 px-6 sm:px-0 border border-black sm:border-none rounded-full cursor-pointer lg:hover:text-black/75 lg:active:text-black/50 duration-300 mt-8"
              >
                Booking request
                <i class="fa-solid fa-arrow-right text-xl -rotate-45 ml-2"></i>
              </button>
              <p
                class="hidden lg:block text-lg lg:text-xl italic lg:w-[40ch] leading-[110%] mt-3.25"
              >
                Often described as a refined presence for evenings and escapes
                shaped by discretion.
              </p>
            </div>
          </div>
          <div class="lg:pt-9">
            <div
              class="grid grid-cols-2 sm:grid-cols-4 gap-8 lg:flex justify-center lg:flex-row lg:gap-10 xl:gap-20"
            >
              <div class="border-l border-[#666666] pl-6">
                <h2
                  class="text-[1.7rem] lg:text-[2.5rem] leading-[110%] tracking-[-2%] times-font mb-[5px]"
                >
                  28
                </h2>
                <p
                  class="text-sm lg:text-xl text-[#767168] leading-[24px] tracking-[-0.4px]"
                >
                  Age
                </p>
              </div>
              <div class="border-l pl-6">
                <h2
                  class="text-[1.7rem] lg:text-[2.5rem] leading-[110%] tracking-[-2%] times-font mb-[5px]"
                >
                  170 cm
                </h2>
                <p
                  class="text-sm lg:text-xl text-[#767168] leading-[24px] tracking-[-0.4px]"
                >
                  Height
                </p>
              </div>
              <div class="border-l pl-6">
                <h2
                  class="text-[1.7rem] lg:text-[2.5rem] leading-[110%] tracking-[-2%] times-font mb-[5px]"
                >
                  English · Italian
                </h2>
                <p
                  class="text-sm lg:text-xl text-[#767168] leading-[24px] tracking-[-0.4px]"
                >
                  Height
                </p>
              </div>
              <div class="border-l pl-6">
                <h2
                  class="text-[1.7rem] lg:text-[2.5rem] leading-[110%] tracking-[-2%] times-font mb-[5px]"
                >
                  Amsterdam
                </h2>
                <p
                  class="text-sm lg:text-xl text-[#767168] leading-[24px] tracking-[-0.4px]"
                >
                  Primary location
                </p>
              </div>
            </div>
          </div>
        </div>
      </header>
      <!-- Gallery -->
      <section class="max-w-[1336px] mx-auto px-4 lg:px-8 pb-20 lg:pb-25">
        <div
          class="lg:hidden"
          id="profile-gallery-mobile"
          aria-label="Profile gallery carousel"
        >
          <div id="profile-gallery-track"></div>
        </div>

        <div
          class="hidden lg:grid grid-cols-12 gap-4"
          id="profile-gallery-desktop"
        ></div>

        <button
          class="lg:hidden bg-[#E5DED4] w-full lg:w-fit sm:bg-transparent text-black flex justify-center sm:justify-start items-center sm:items-end text-xl xl:text-2xl font-tight tracking-[-1px] leading-[110%] text-left py-4 sm:py-0 px-6 sm:px-0 border border-black sm:border-none rounded-full cursor-pointer lg:hover:text-black/75 lg:active:text-black/50 duration-300 mt-8"
        >
          Booking request
          <i class="fa-solid fa-arrow-right text-xl -rotate-45 ml-2"></i>
        </button>
      </section>
    </main>
    <div id="footer"></div>

    <script src="../js/profile.js"></script>
  </body>
</html>
